name: SonarCloud Analysis

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sonarcloud-analysis-${{ github.ref }}
  cancel-in-progress: true

env:
  MAVEN_CLI_OPTS: --batch-mode --no-transfer-progress

jobs:
  analyze:
    name: SonarCloud analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >
      github.actor != 'dependabot[bot]' &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Java and Maven for profile-service
        uses: ./.github/actions/setup-java-maven
        with:
          java-version: "25"
          cache-dependency-path: profile-service/pom.xml

      - name: Build profile-service with coverage
        working-directory: profile-service
        run: mvn ${{ env.MAVEN_CLI_OPTS }} clean verify

      - name: Setup Java and Maven for Keycloak SPI
        uses: ./.github/actions/setup-java-maven
        with:
          java-version: "21"
          cache-dependency-path: keycloak/auth-event-listener-spi/pom.xml

      - name: Build Keycloak SPI
        working-directory: keycloak/auth-event-listener-spi
        run: mvn ${{ env.MAVEN_CLI_OPTS }} clean verify

      - name: Run SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.projectName=estate-booking-platform
            -Dsonar.sources=profile-service/src/main/java,keycloak/auth-event-listener-spi/src/main/java
            -Dsonar.java.binaries=profile-service/target/classes,keycloak/auth-event-listener-spi/target/classes
            -Dsonar.coverage.jacoco.xmlReportPaths=profile-service/target/site/jacoco/jacoco.xml,profile-service/target/site/jacoco-it/jacoco.xml
