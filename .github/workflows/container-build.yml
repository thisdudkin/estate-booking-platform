name: Container Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: container-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Docker build / ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        image:
          - name: profile-service
            context: profile-service
            dockerfile: profile-service/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Check Dockerfile
        id: dockerfile
        shell: bash
        run: |
          if [ -f "${{ matrix.image.dockerfile }}" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Skipping ${{ matrix.image.name }} because ${{ matrix.image.dockerfile }} does not exist."
          fi

      - name: Build image
        if: steps.dockerfile.outputs.exists == 'true'
        uses: ./.github/actions/docker-build-publish
        with:
          image-name: ghcr.io/${{ github.repository }}/${{ matrix.image.name }}
          context: ${{ matrix.image.context }}
          dockerfile: ${{ matrix.image.dockerfile }}
          push: "false"
