name: Container Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: container-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish / ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        image:
          - name: profile-service
            context: profile-service
            dockerfile: profile-service/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Check Dockerfile
        id: dockerfile
        shell: bash
        run: |
          if [ -f "${{ matrix.image.dockerfile }}" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Skipping ${{ matrix.image.name }} because ${{ matrix.image.dockerfile }} does not exist."
          fi

      - name: Build and publish image
        if: steps.dockerfile.outputs.exists == 'true'
        uses: ./.github/actions/docker-build-publish
        with:
          image-name: ghcr.io/${{ github.repository }}/${{ matrix.image.name }}
          context: ${{ matrix.image.context }}
          dockerfile: ${{ matrix.image.dockerfile }}
          push: "true"
          registry-password: ${{ secrets.GITHUB_TOKEN }}
