name: Docker build and publish
description: Build a Docker image and optionally publish it to a container registry.

inputs:
  image-name:
    description: Fully qualified image name without a tag.
    required: true
  context:
    description: Docker build context.
    required: true
  dockerfile:
    description: Path to the Dockerfile.
    required: true
  push:
    description: Whether to publish the image.
    required: false
    default: "false"
  registry:
    description: Container registry host.
    required: false
    default: ghcr.io
  registry-username:
    description: Registry username.
    required: false
    default: ${{ github.actor }}
  registry-password:
    description: Registry password or token.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to container registry
      if: inputs.push == 'true'
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.registry-username }}
        password: ${{ inputs.registry-password }}

    - name: Extract Docker metadata
      id: metadata
      uses: docker/metadata-action@v5
      with:
        images: ${{ inputs.image-name }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix=sha-
        labels: |
          org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          org.opencontainers.image.revision=${{ github.sha }}

    - name: Build Docker image
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        push: ${{ inputs.push == 'true' }}
        tags: ${{ steps.metadata.outputs.tags }}
        labels: ${{ steps.metadata.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
