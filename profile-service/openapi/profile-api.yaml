openapi: 3.0.0

info:
  title: Profile Service API
  version: 1.0.0
  description: API for tenant and landlord business profiles linked to Keycloak users.

servers:
  - url: http://localhost:8091
    description: Local Profile Service

tags:
  - name: Profiles
  - name: FavoriteListings
  - name: InternalProfiles

paths:
  /api/v1/profiles/me:
    get:
      tags:
        - Profiles
      operationId: getMyProfile
      summary: Get current user's business profile
      security:
        - bearerAuth: [ ]
      responses:
        "200":
          description: Current user's profile data.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyProfileResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/ProfileNotReady"

    patch:
      tags:
        - Profiles
      operationId: updateMyProfile
      summary: Update current user's profile data
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMyProfileRequest"
      responses:
        "200":
          description: Updated profile data.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyProfileResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/ProfileNotReady"

  /api/v1/profiles/me/favorite-listings:
    get:
      tags:
        - FavoriteListings
      operationId: getMyFavoriteListings
      summary: Get current tenant's favorite listings
      security:
        - bearerAuth: [ ]
      responses:
        "200":
          description: Favorite listings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FavoriteListingsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/ProfileNotReady"

  /api/v1/profiles/me/favorite-listings/{listingId}:
    post:
      tags:
        - FavoriteListings
      operationId: addMyFavoriteListing
      summary: Add listing to current tenant's favorites
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: "#/components/parameters/ListingId"
      responses:
        "201":
          description: Listing added to favorites.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FavoriteListingResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/ProfileNotReady"

    delete:
      tags:
        - FavoriteListings
      operationId: removeMyFavoriteListing
      summary: Remove listing from current tenant's favorites
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: "#/components/parameters/ListingId"
      responses:
        "204":
          description: Listing removed from favorites.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /internal/api/v1/profiles/tenant:
    post:
      tags:
        - InternalProfiles
      operationId: provisionTenantProfile
      summary: Provision default tenant profile
      description: Idempotently creates the default tenant profile for a Keycloak user.
      security:
        - serviceBearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProvisionTenantProfileRequest"
      responses:
        "200":
          description: Existing tenant profile returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantProfileResponse"
        "201":
          description: Tenant profile created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantProfileResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /internal/api/v1/profiles/landlord:
    post:
      tags:
        - InternalProfiles
      operationId: provisionLandlordProfile
      summary: Provision landlord profile
      description: Idempotently creates a landlord profile for an existing Keycloak user.
      security:
        - serviceBearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProvisionLandlordProfileRequest"
      responses:
        "200":
          description: Existing landlord profile returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LandlordProfileResponse"
        "201":
          description: Landlord profile created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LandlordProfileResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

    serviceBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ListingId:
      name: listingId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Request validation failed.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
          example:
            type: /problems/request-validation-failed
            title: Request validation failed
            status: 400
            detail: One or more request fields are invalid.
            instance: /api/profiles/me

    Unauthorized:
      description: Missing or invalid access token.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
          example:
            type: /problems/unauthorized
            title: Unauthorized
            status: 401
            detail: Missing or invalid access token.
            instance: /api/profiles/me

    Forbidden:
      description: Caller is not allowed to perform this operation.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
          example:
            type: /problems/forbidden
            title: Forbidden
            status: 403
            detail: Caller is not allowed to perform this operation.
            instance: /internal/api/profiles/tenant

    NotFound:
      description: Resource was not found.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
          example:
            type: /problems/resource-not-found
            title: Resource not found
            status: 404
            detail: Requested resource was not found.
            instance: /api/profiles/me/favorite-listings/2b76d4c4-3a76-4a91-9d13-10f3a20ad4e2

    ProfileNotReady:
      description: Profile provisioning is still recovering.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
          example:
            type: /problems/profile-not-ready
            title: Profile not ready
            status: 409
            detail: Profile provisioning is still in progress.
            instance: /api/profiles/me

  schemas:
    MyProfileResponse:
      type: object
      required:
        - profile
        - tenant
      properties:
        profile:
          $ref: "#/components/schemas/ProfileResponse"
        tenant:
          $ref: "#/components/schemas/TenantProfileResponse"
        landlord:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/LandlordProfileResponse"

    ProfileResponse:
      type: object
      required:
        - id
        - userId
        - displayName
        - status
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        displayName:
          type: string
        phone:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/ProfileStatus"

    TenantProfileResponse:
      type: object
      required:
        - id
        - userId
        - status
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        preferredCity:
          type: string
          nullable: true
        contactName:
          type: string
          nullable: false
        status:
          $ref: "#/components/schemas/TenantStatus"

    LandlordProfileResponse:
      type: object
      required:
        - id
        - userId
        - verificationStatus
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        publicName:
          type: string
          nullable: true
        contactPhone:
          type: string
          nullable: true
        verificationStatus:
          $ref: "#/components/schemas/LandlordVerificationStatus"

    FavoriteListingResponse:
      type: object
      required:
        - id
        - tenantProfileId
        - listingId
      properties:
        id:
          type: string
          format: uuid
        tenantProfileId:
          type: string
          format: uuid
        listingId:
          type: string
          format: uuid

    FavoriteListingsResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/FavoriteListingResponse"

    UpdateMyProfileRequest:
      type: object
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 120
        phone:
          type: string
          nullable: true
          maxLength: 32
        tenant:
          $ref: "#/components/schemas/UpdateTenantProfileRequest"
        landlord:
          $ref: "#/components/schemas/UpdateLandlordProfileRequest"

    UpdateTenantProfileRequest:
      type: object
      properties:
        preferredCity:
          type: string
          nullable: true
          maxLength: 120
        contactName:
          type: string
          nullable: true
          maxLength: 120
        contactPhone:
          type: string
          nullable: true
          maxLength: 32

    UpdateLandlordProfileRequest:
      type: object
      properties:
        publicName:
          type: string
          nullable: true
          maxLength: 120
        contactPhone:
          type: string
          nullable: true
          maxLength: 32

    ProvisionTenantProfileRequest:
      type: object
      required:
        - userId
        - displayName
      properties:
        userId:
          type: string
          format: uuid
        displayName:
          type: string
          minLength: 1
          maxLength: 120
        phone:
          type: string
          nullable: true
          maxLength: 32

    ProvisionLandlordProfileRequest:
      type: object
      required:
        - userId
      properties:
        userId:
          type: string
          format: uuid
        publicName:
          type: string
          nullable: true
          maxLength: 120
        contactPhone:
          type: string
          nullable: true
          maxLength: 32

    ProfileStatus:
      type: string
      enum:
        - ACTIVE
        - BLOCKED
        - DELETED

    TenantStatus:
      type: string
      enum:
        - ACTIVE
        - SUSPENDED
        - DELETED

    LandlordVerificationStatus:
      type: string
      enum:
        - PENDING
        - VERIFIED
        - REJECTED

    ProblemDetail:
      type: object
      required:
        - type
        - title
        - status
      properties:
        type:
          type: string
          default: about:blank
          format: uri-reference
          description: Problem type URI.
        title:
          type: string
          example: Profile not found
        status:
          type: integer
          format: int32
          minimum: 100
          maximum: 599
          example: 409
        detail:
          type: string
          example: Profile provisioning is still in progress.
        instance:
          type: string
          format: uri-reference
          example: /api/profiles/me