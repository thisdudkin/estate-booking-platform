services:
  keycloak-postgres:
    image: postgres:18.4
    container_name: keycloak_postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    ports:
      - "5433:5432"
    volumes:
      - keycloak_pg:/var/lib/postgresql
    networks:
      - estate-platform_net

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: keycloak
    command:
      - start-dev
      - --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak_postgres
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HOSTNAME: localhost
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "9090:8080"
    volumes:
      - ./infrastructure/keycloak/estate-platform-realm-export.json:/opt/keycloak/data/import/estate-platform-realm-export.json
    depends_on:
      - keycloak-postgres
    networks:
      - estate-platform_net

  profile-postgres:
    image: postgres:18.4
    container_name: profile_postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - profile_pg:/var/lib/postgresql
      - ./infrastructure/db/profile:/docker-entrypoint-initdb.d:ro
    networks:
      - estate-platform_net

  identity-postgres:
    image: postgres:18.4
    container_name: identity_postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - identity_pg:/var/lib/postgresql
      - ./infrastructure/db/identity:/docker-entrypoint-initdb.d:ro
    networks:
      - estate-platform_net

volumes:
  keycloak_pg:
  profile_pg:
  identity_pg:

networks:
  estate-platform_net:
