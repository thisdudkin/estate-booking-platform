spring:

  # Common Settings
  application:
    group: estate-booking-platform
    name: estate-booking-platform-identity-api

  # Virtual Threads Settings
  threads:
    virtual:
      enabled: true

  # Exclude null fields from responses
  jackson:
    default-property-inclusion: non_null

  # Datasource Settings
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5435/identity_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

    # HikariCP Settings
    hikari:
      schema: data
      auto-commit: false
      pool-name: ${spring.application.name}-hikari
      transaction-isolation: TRANSACTION_READ_COMMITTED

      # Warning: This is the initial configuration
      # For configuration, look at the database metrics
      minimum-idle: ${DB_POOL_MIN_IDLE:10}
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}

      # Fail-fast
      idle-timeout: ${DB_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_MAX_LIFETIME:1800000}
      keepalive-time: ${DB_KEEPALIVE_TIME:120000}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:5000}
      validation-timeout: ${DB_VALIDATION_TIMEOUT:5000}

      # Custom Datasource Properties
      data-source-properties:
        reWriteBatchInserts: true

  # Flyway Settings
  flyway:
    enabled: true
    schemas: data
    default-schema: data
    create-schemas: true
    validate-on-migrate: true
    locations: classpath:db/migration

  # JPA Settings
  jpa:

    # Common Settings
    show-sql: false
    open-in-view: false
    hibernate:
      ddl-auto: validate

    # Hibernate Settings
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
          batch_size: 15
        order_inserts: true
        order_updates: true
        connection:
          provider_disables_autocommit: true
        query:
          plan_cache_max_size: 4096
          in_clause_parameter_padding: true
          fail_on_pagination_over_collection_fetch: true

  # Spring Security
  security:

    # OAuth 2 & OpenID Connect
    oauth2:

      # OAuth 2 Client Settings
      client:
        registration:
          keycloak:
            provider: keycloak
            client-id: ${KEYCLOAK_CLIENT_ID:identity-api}
            client-secret: ${KEYCLOAK_CLIENT_SECRET:ktws9PlKYm0r68NJDXp0hcWL1j9wBSR4}
            authorization-grant-type: client_credentials
        provider:
          keycloak:
            token-uri: ${KEYCLOAK_TOKEN_URI:http://localhost:9090/realms/estate-platform/protocol/openid-connect/token}

  # OpenFeign Settings
  cloud:
    openfeign:
      oauth2:
        enabled: true
        client-registration-id: keycloak

# Application Settings
application:

  # Identity Provider Settings
  identity-provider:
    type: ${IDENTITY_PROVIDER:keycloak}

  # Registration Settings
  registration:
    role-groups:
      TENANT: tenants
      LANDLORD: landlords

  # Integration Settings
  integration:
    profile-service:
      base-url: ${PROFILE_SERVICE_URL:http://localhost:8091}
      connect-timeout: ${PROFILE_SERVICE_CONNECT_TIMEOUT:3s}
      read-timeout: ${PROFILE_SERVICE_READ_TIMEOUT:5s}

  # Security Providers
  security-provider:
    keycloak:
      server-url: ${KEYCLOAK_SERVER_URL:http://localhost:9090}
      realm: ${KEYCLOAK_REALM:estate-platform}
      client-id: ${spring.security.oauth2.client.registration.keycloak.client-id}
      client-secret: ${spring.security.oauth2.client.registration.keycloak.client-secret}

# Resilience4j Settings
resilience4j:
  retry:
    instances:
      profile-service:
        max-attempts: ${PROFILE_SERVICE_RETRY_MAX_ATTEMPTS:3}
        wait-duration: ${PROFILE_SERVICE_RETRY_WAIT_DURATION:250ms}
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        ignore-exceptions:
          - io.petproject.estate.booking.platform.identity.exception.ProfileServiceIntegrationException

  circuitbreaker:
    instances:
      profile-service:
        sliding-window-type: count_based
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        ignore-exceptions:
          - io.petproject.estate.booking.platform.identity.exception.ProfileServiceIntegrationException

# SQL Logging Settings
decorator:
  datasource:
    datasource-proxy:
      logging: slf4j
      query:
        log-level: debug
        enable-logging: true
      slow-query:
        log-level: warn
        enable-logging: true
      multiline: true
      format-sql: true

# Logging Settings
logging:
  include-application-group: true
  level:
    net.ttddyy.dsproxy.listener: debug
