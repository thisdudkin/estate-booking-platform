spring:

  # Common Settings
  application:
    group: estate-booking-platform
    name: estate-booking-platform-profile-service

  # Virtual Threads Settings
  threads:
    virtual:
      enabled: true

  # Exclude null fields from responses
  jackson:
    default-property-inclusion: non_null

  # Datasource Settings
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/profile_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

    # HikariCP Settings
    hikari:
      schema: data
      auto-commit: false
      pool-name: ${spring.application.name}-hikari
      transaction-isolation: TRANSACTION_READ_COMMITTED

      # Warning: This is the initial configuration
      # For configuration, look at the database metrics
      minimum-idle: ${DB_POOL_MIN_IDLE:10}
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}

      # Fail-fast
      idle-timeout: ${DB_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_MAX_LIFETIME:1800000}
      keepalive-time: ${DB_KEEPALIVE_TIME:120000}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:5000}
      validation-timeout: ${DB_VALIDATION_TIMEOUT:5000}

      # Custom Datasource Properties
      data-source-properties:
        reWriteBatchInserts: true

  # Flyway Settings
  flyway:
    enabled: true
    schemas: data
    default-schema: data
    create-schemas: true
    validate-on-migrate: true
    locations: classpath:db/migration

  # JPA Settings
  jpa:

    # Common Settings
    show-sql: false
    open-in-view: false
    hibernate:
      ddl-auto: validate

    # Hibernate Settings
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
          batch_size: 15
        order_inserts: true
        order_updates: true
        connection:
          provider_disables_autocommit: true
        query:
          plan_cache_max_size: 4096
          in_clause_parameter_padding: true
          fail_on_pagination_over_collection_fetch: true

  # Spring Security
  security:

    # OAuth 2 & OpenID Connect
    oauth2:

      # OAuth 2 Resource Server Settings
      resourceserver:
        jwt:
          issuer-uri: ${ISSUER_URI:http://localhost:9090/realms/estate-platform}

# Application Settings
application:

  # Security Settings
  security:
    provider: keycloak
    resource-id: profile-service

    # Public API Settings
    public-api:
      allowed-platform-roles:
        - admin
        - tenant
        - landlord
        - moderator

    # Internal API Settings
    internal-api:
      audience-required: true
      required-permission: internal_access
      trusted-client-ids:
        - identity-api

  # Security Providers
  security-provider:
    keycloak:
      roles-claim: roles
      client-id-claim: client_id
      authorized-party-claim: azp
      realm-access-claim: realm_access
      realm-role-prefix: estate.platform.
      resource-access-claim: resource_access

# SQL Logging Settings
decorator:
  datasource:
    datasource-proxy:
      logging: slf4j
      query:
        log-level: debug
        enable-logging: true
      slow-query:
        log-level: warn
        enable-logging: true
      multiline: true
      format-sql: true

# Logging Settings
logging:
  include-application-group: true
  level:
    net.ttddyy.dsproxy.listener: debug
